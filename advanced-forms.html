<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced forms</title>
</head>
<body>

    <!-- drop down menus -->
     <h2>Drop down menus</h2>
     <b>Select your state</b>
     <form>
        <select name="state">
            <option value="">Please choose an option</option>
            <option value="AL">Alabama</option>
            <option value="CA">California</option>
            <option value="TX">Texas</option>
            <option value="MN">Minnesota</option><br>
        </select>
        <button type="submit">Submit</button>
    </form>
    <br>
    <h2>Text boxes</h2>
    Enter some text
    <form>
    <!-- larger text blocks -->

     <textarea name="essay" id="" cols="75" rows="5">
        
     </textarea><br>
     <button type="submit">Submit text</button>
     </form>
    <!-- submission of files -->

</body>
</html>
