<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!--Entities always start with an & and end in ;-->
    <!--Greater than-->
    <p>10 &gt; 9</p>
    <!--Less than-->
    <p>9 &lt; 10</p>
    <!--Copyright-->
    <p>&copy; 2024</p>
    <!--Registered trademark-->
    <p>&reg; 2024</p>
    <!--Trademark-->
    <p>&trade; 2024</p>
    <p>&ldquo;Here is a quote&rdquo;</p>
</body>
</html>
